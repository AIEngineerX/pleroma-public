name: verify

# G12: the commit gate and the full browser acceptance suite run in the cloud on every push,
# so the dev machine never hosts marathon gates. verify (~6 min) blocks; e2e reports.
on:
  push:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix worker
      - run: npm ci --prefix web
      - run: npm run verify

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix worker
      - run: npm ci --prefix web
      - run: npx --prefix web playwright install --with-deps chromium
      - run: npm run e2e --prefix web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: web/test-results
          retention-days: 7
