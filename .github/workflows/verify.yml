name: verify

# G12: the commit gate and the full browser acceptance suite run in the cloud on every push,
# so the dev machine never hosts marathon gates. verify (~6 min) blocks; e2e reports.
on:
  push:
  workflow_dispatch:

# A newer push to the same branch cancels the superseded in-flight run.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Hard cap — the 6h GitHub default let a hung npm run verify bill 361 min per push
    # (six in a row on 2026-07-16 exhausted the account's monthly Actions minutes).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix worker
      - run: npm ci --prefix web
      # The tallies effect test launches real Chromium — without this install the verify job
      # died at browserType.launch (the failure the 2026-07-16 hang was hiding). Cached so a
      # green run doesn't re-download the browser on every push.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - run: npx --prefix web playwright install --with-deps chromium
      - run: npm run verify

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix worker
      - run: npm ci --prefix web
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}
      - run: npx --prefix web playwright install --with-deps chromium
      - run: npm run e2e --prefix web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: web/test-results
          retention-days: 7
