name = "pleroma-worker"
main = "src/index.ts"
compatibility_date = "2025-09-06"

[vars]
ENVIRONMENT = "dev"
CORS_ORIGIN = "http://localhost:5173"
VOICE_VENDOR = ""
# VIDEO_VENDOR: "xai" = Grok Imagine renders the nightly DREAM plate; "" = video off (DREAM stays
# text-only). Left "" until XAI_API_KEY's Grok Imagine access is verified via the live test (PLANNING
# open question 3c), then flipped to "xai" in [env.production] — the same pattern as VOICE_VENDOR.
VIDEO_VENDOR = ""
ELEVENLABS_VOICE_ID = "GV2NykjR8dDFooRE8bCC"
PULSE_MINT = ""
PULSE_POOLS = ""

[[d1_databases]]
binding = "DB"
database_name = "pleroma"
database_id = "1c3f1d37-2699-4399-963d-8287a1325721"

# Quarantine expiry (PLANNING.md Safety & moderation): objects under the `quarantine/` prefix
# are deleted after 24h by sweepQuarantine() in worker/src/eye.ts, run every scheduled tick
# (worker/src/index.ts) inside the tick lock — this is the authoritative, in-repo, tested
# enforcement, not a comment. Uploads land in quarantine/<id> and are either promoted to
# offerings/<id> on a moderation ALLOW or purged immediately on REJECT; the sweep is the
# backstop for anything that never gets a verdict or whose immediate delete failed. An R2
# dashboard lifecycle rule mirroring the same 24h window is an OPTIONAL secondary backstop,
# not the sole mechanism.
[[r2_buckets]]
binding = "RELICS"
bucket_name = "pleroma-relics"

[triggers]
crons = ["*/15 * * * *", "50 0 * * *", "0 3 * * *", "30 3 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[env.production]
routes = [{ pattern = "api.pleromachurch.xyz", custom_domain = true }]
vars = { ENVIRONMENT = "production", CORS_ORIGIN = "https://pleromachurch.xyz", VOICE_VENDOR = "elevenlabs", VIDEO_VENDOR = "xai", ELEVENLABS_VOICE_ID = "GV2NykjR8dDFooRE8bCC", PULSE_MINT = "AbKkN5orbr45u9ggjjcLb16H1CvLZzzgbfCAx4w1pump", PULSE_POOLS = "93A828eh3hRsGRgZtz7PQ23ukEBui6wDg523Ja7Tzy5n" }
[[env.production.d1_databases]]
binding = "DB"
database_name = "pleroma-prod"
database_id = "a826652a-fa1b-424d-b63a-7365a1005484"
[[env.production.r2_buckets]]
binding = "RELICS"
bucket_name = "pleroma-relics-prod"
[env.production.triggers]
crons = ["*/15 * * * *", "50 0 * * *", "0 3 * * *", "30 3 * * *"]
[env.production.observability]
enabled = true
head_sampling_rate = 1
